<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#20423b">
<title>Sổ Thu Trọ</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2320423b'/%3E%3Cpath d='M50 22 L80 46 V80 H20 V46 Z' fill='none' stroke='%23e8c766' stroke-width='6' stroke-linejoin='round'/%3E%3Crect x='42' y='58' width='16' height='22' fill='%23e8c766'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2320423b'/%3E%3Cpath d='M50 22 L80 46 V80 H20 V46 Z' fill='none' stroke='%23e8c766' stroke-width='6' stroke-linejoin='round'/%3E%3Crect x='42' y='58' width='16' height='22' fill='%23e8c766'/%3E%3C/svg%3E">
<link rel="manifest" href="manifest.json">
<style>
:root{
  --bg:#eef1ea;
  --paper:#fbfbf8;
  --ink:#1c2b28;
  --ink-soft:#5b6b64;
  --line:#d9dccf;
  --line-strong:#20423b;
  --primary:#20423b;
  --primary-dark:#132a25;
  --primary-soft:#e3ebe4;
  --accent:#c68a2e;
  --accent-soft:#f7ecd6;
  --danger:#a3402f;
  --danger-soft:#f6e4de;
  --ok:#3c7a52;
  --ok-soft:#e4efe3;
  --radius:16px;
  --radius-sm:10px;
  --shadow:0 1px 2px rgba(20,30,25,.06), 0 6px 20px -8px rgba(20,30,25,.18);
  --maxw:480px;
  font-variant-numeric: tabular-nums;
}
*{box-sizing:border-box;}
html,body{height:100%;}
svg{width:1em;height:1em;display:inline-block;vertical-align:-0.15em;flex:none;}
body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  font-size:15px;
}
#viewport{
  max-width:var(--maxw);
  margin:0 auto;
  min-height:100%;
  background:var(--bg);
  position:relative;
  display:flex;
  flex-direction:column;
  padding-bottom:calc(64px + env(safe-area-inset-bottom));
}
@media (min-width:520px){
  #viewport{
    box-shadow:var(--shadow);
    margin-top:18px;
    margin-bottom:18px;
    min-height:calc(100vh - 36px);
    border-radius:24px;
    overflow:hidden;
  }
}

/* ---------- header (compact app bar) ---------- */
.topbar{
  padding:12px 16px 10px;
  background:var(--primary);
  color:#fff;
  border-bottom-left-radius:16px;
  border-bottom-right-radius:16px;
}
.topbar .tb-row{
  display:flex;align-items:center;gap:10px;
}
.topbar .tb-icon{
  width:30px;height:30px;border-radius:9px;
  background:rgba(255,255,255,.14);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;flex:0 0 auto;
}
.topbar .tb-icon svg{width:15px;height:15px;}
.topbar .tb-text{flex:1;min-width:0;}
.topbar h1{
  margin:0;
  font-size:15.5px;
  font-weight:700;
  letter-spacing:.01em;
  line-height:1.25;
}
.topbar .sub{
  font-size:11.5px;
  color:rgba(255,255,255,.7);
  line-height:1.3;
  margin-top:1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.topbar .tb-action{
  width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,.14);
  border:none;color:#fff;display:flex;align-items:center;justify-content:center;
  flex:0 0 auto;font-size:14px;
}
.topbar .tb-action svg{width:15px;height:15px;}
.month-switch{
  margin-top:10px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,.1);
  border-radius:999px;
  padding:3px;
}
.month-switch button{
  width:30px;height:30px;border-radius:50%;border:none;background:transparent;
  color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;
}
.month-switch button:disabled{opacity:.3;}
.month-switch button:active{background:rgba(255,255,255,.18);}
.month-switch .label{
  font-weight:700;font-size:13.5px;letter-spacing:.01em;
}

/* ---------- content ---------- */
.content{
  flex:1;
  padding:16px 16px 24px;
  display:flex;flex-direction:column;gap:14px;
}
.section-title{
  display:flex;align-items:baseline;justify-content:space-between;
  margin:4px 2px 0;
}
.section-title h2{
  font-size:12px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--ink-soft);font-weight:700;margin:0;
}
.section-title .link{
  font-size:13px;color:var(--primary);font-weight:600;
}

/* ---------- summary card (ledger style) ---------- */
.card{
  background:var(--paper);
  border-radius:var(--radius);
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  padding:16px;
}
.summary-card .total{
  font-size:28px;font-weight:800;color:var(--primary);letter-spacing:-.01em;
}
.summary-card .total small{font-size:14px;font-weight:600;color:var(--ink-soft);margin-left:6px;}
.ledger-row{
  display:flex;align-items:baseline;gap:6px;
  font-size:13.5px;color:var(--ink);
  padding:5px 0;
}
.ledger-row .lbl{color:var(--ink-soft);white-space:nowrap;}
.ledger-row .fill{
  flex:1;border-bottom:1.5px dotted var(--line-strong);
  opacity:.35;margin-bottom:4px;
}
.ledger-row .val{font-weight:700;white-space:nowrap;}
.ledger-row.total .val{color:var(--primary);font-size:16px;}
.ledger-row.danger .val{color:var(--danger);}
.ledger-row.ok .val{color:var(--ok);}

/* ---------- room cards ---------- */
.room-card{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:14px 14px;
  display:flex;align-items:center;gap:12px;
  box-shadow:var(--shadow);
}
.room-card .avatar{
  width:44px;height:44px;border-radius:12px;
  background:var(--primary-soft);color:var(--primary);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:15px;flex:0 0 auto;
}
.room-card .body{flex:1;min-width:0;}
.room-card .name{font-weight:700;font-size:15px;display:flex;align-items:center;gap:6px;}
.room-card .meta{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
.room-card .right{text-align:right;flex:0 0 auto;}
.room-card .amount{font-weight:800;font-size:15px;}
.room-card .chip{
  display:inline-block;margin-top:4px;font-size:11px;font-weight:700;
  padding:3px 8px;border-radius:999px;letter-spacing:.02em;
}
.chip-pending{background:var(--accent-soft);color:var(--accent);}
.chip-unpaid{background:var(--danger-soft);color:var(--danger);}
.chip-paid{background:var(--ok-soft);color:var(--ok);}
.room-card .chevron{color:var(--line-strong);opacity:.35;}
.room-card.empty-state{
  flex-direction:column;align-items:stretch;text-align:center;padding:32px 20px;
}
.room-card.empty-state .icon{
  font-size:34px;margin-bottom:8px;
}
.room-card.empty-state p{
  color:var(--ink-soft);font-size:13.5px;margin:4px 0 14px;line-height:1.5;
}

/* ---------- buttons ---------- */
.btn{
  appearance:none;border:none;cursor:pointer;
  font-family:inherit;font-weight:700;font-size:14.5px;
  padding:12px 18px;border-radius:12px;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  transition:transform .08s ease;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--primary);color:#fff;}
.btn-accent{background:var(--accent);color:#fff;}
.btn-ghost{background:var(--primary-soft);color:var(--primary);}
.btn-outline{background:transparent;color:var(--primary);border:1.5px solid var(--primary);}
.btn-danger{background:var(--danger-soft);color:var(--danger);}
.btn-block{width:100%;}
.btn-sm{padding:8px 12px;font-size:13px;border-radius:9px;}
.fab{
  position:fixed;
  right:calc(50% - min(480px,100vw)/2 + 18px);
  bottom:calc(78px + env(safe-area-inset-bottom));
  width:52px;height:52px;border-radius:50%;
  background:var(--accent);color:#fff;font-size:20px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 20px -4px rgba(198,138,46,.55);
  z-index:40;border:none;
}

/* ---------- bottom nav ---------- */
.tabbar{
  position:fixed;
  left:0;right:0;bottom:0;
  max-width:var(--maxw);margin:0 auto;
  background:var(--paper);
  border-top:1px solid var(--line);
  display:flex;
  padding-bottom:env(safe-area-inset-bottom);
  z-index:50;
}
.tabbar button{
  flex:1;border:none;background:transparent;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:9px 0 8px;color:var(--ink-soft);font-size:11px;font-weight:600;
}
.tabbar button.active{color:var(--primary);}
.tabbar button svg{width:22px;height:22px;}

/* ---------- forms ---------- */
.field{margin-bottom:14px;}
.field label{
  display:block;font-size:12.5px;font-weight:700;color:var(--ink-soft);
  margin-bottom:6px;letter-spacing:.01em;
}
.field .hint{font-size:11.5px;color:var(--ink-soft);margin-top:5px;line-height:1.4;}
input[type=text],input[type=number],input[type=password],input[type=tel],textarea,select{
  width:100%;font-family:inherit;font-size:15px;color:var(--ink);
  background:#fff;border:1.5px solid var(--line);border-radius:10px;
  padding:11px 12px;
}
input:focus,textarea:focus,select:focus{outline:2px solid var(--primary);outline-offset:1px;}
textarea{resize:vertical;min-height:64px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stepper{display:flex;align-items:center;gap:10px;}
.stepper button{
  width:38px;height:38px;border-radius:10px;border:1.5px solid var(--line);
  background:#fff;font-size:18px;font-weight:700;color:var(--primary);
}
.stepper .val{font-weight:800;font-size:17px;min-width:28px;text-align:center;}
.toggle-adv{
  font-size:13px;font-weight:700;color:var(--primary);
  display:flex;align-items:center;gap:6px;margin:2px 0 10px;
  background:none;border:none;padding:4px 0;
}
.divider{height:1px;background:var(--line);margin:14px 0;border:none;}
.field-label-row{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  margin-bottom:6px;
}
.field-label-row label{margin-bottom:0;}
.edit-old-btn{
  appearance:none;border:none;cursor:pointer;font-family:inherit;
  font-size:11px;font-weight:700;color:var(--primary);
  background:var(--primary-soft);border-radius:7px;padding:3px 9px;
  flex:0 0 auto;
}
input[readonly]{background:var(--bg);color:var(--ink-soft);}
.input-error{border-color:var(--danger) !important;background:var(--danger-soft) !important;}

/* ---------- drag to reorder rooms ---------- */
.room-list{display:flex;flex-direction:column;gap:10px;}
.drag-handle{
  flex:0 0 auto;width:44px;height:44px;margin:-4px -8px -4px -4px;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink-soft);cursor:grab;touch-action:none;
  border-radius:10px;
}
.drag-handle:active{background:var(--primary-soft);color:var(--primary);}
.drag-handle svg{width:20px;height:20px;}
.room-card.dragging{
  box-shadow:0 14px 30px -6px rgba(20,30,25,.4);
  opacity:.97;position:relative;z-index:5;transform:scale(1.02);
}
.sort-toggle{
  display:flex;gap:6px;margin-bottom:2px;
}
.sort-toggle button{
  font-size:11.5px;font-weight:700;padding:5px 10px;border-radius:999px;
  border:1.5px solid var(--line);background:var(--paper);color:var(--ink-soft);
}
.sort-toggle button.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.order-input{
  width: 20% !important;
  flex:0 0 auto;width:40px;height:36px;margin-right:2px;
  text-align:center;font-weight:800;font-size:14px;
  border:1.5px solid var(--line);border-radius:9px;padding:0;
  color:var(--primary);background:var(--paper);
}

/* ---------- clickable ledger row ---------- */
.ledger-row.link-row{cursor:pointer;}
.ledger-row.link-row .val{color:var(--accent);}

/* ---------- stats tab ---------- */
.stat-card{margin-bottom:0;}
.stat-room{font-weight:800;font-size:14.5px;}
.stat-chart-label{
  font-size:12px;font-weight:700;color:var(--ink-soft);
  display:flex;align-items:center;gap:6px;
}
.stat-chart-label svg{width:13px;height:13px;}
.stat-delta{
  margin-left:auto;font-size:11px;font-weight:800;padding:2px 7px;border-radius:999px;
  background:var(--primary-soft);color:var(--primary);
}
.stat-delta.up{background:var(--danger-soft);color:var(--danger);}
.stat-delta.down{background:var(--ok-soft);color:var(--ok);}
.stat-bars{
  display:flex;align-items:flex-end;gap:5px;height:58px;margin:6px 0 2px;
}
.stat-bar{
  flex:1;min-height:2px;border-radius:4px 4px 2px 2px;
  background:var(--primary-soft);
}
.stat-bar.last{background:var(--primary);}
.stat-bar.up{background:var(--danger);}
.stat-bar.down{background:var(--ok);}
.stat-months{display:flex;gap:5px;font-size:10px;color:var(--ink-soft);margin-bottom:2px;}
.stat-months span{flex:1;text-align:center;}
.stat-pay-bars{display:flex;align-items:flex-end;gap:5px;height:44px;margin:6px 0 2px;}
.stat-pay-bar{flex:1;min-height:2px;border-radius:4px 4px 2px 2px;overflow:hidden;display:flex;flex-direction:column-reverse;background:var(--line);}
.stat-pay-bar .seg-paid{background:var(--ok);width:100%;}
.stat-pay-bar .seg-owed{background:var(--danger);width:100%;}
.stat-pay-summary{font-size:11.5px;color:var(--ink-soft);margin-top:2px;}
.stat-pay-summary b{color:var(--ink);}
.stat-range-toggle{display:flex;gap:6px;margin:2px 2px 4px;}
.stat-range-toggle button{
  font-size:11.5px;font-weight:700;padding:5px 12px;border-radius:999px;
  border:1.5px solid var(--line);background:var(--paper);color:var(--ink-soft);
}
.stat-range-toggle button.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.admin-note-card textarea{min-height:56px;}

/* ---------- modal / sheet ---------- */
#modalRoot{position:fixed;inset:0;z-index:100;pointer-events:none;}
.overlay{
  position:absolute;inset:0;background:rgba(20,30,25,.42);
  opacity:0;transition:opacity .18s ease;pointer-events:none;
}
.sheet{
  position:absolute;left:0;right:0;bottom:0;
  max-width:var(--maxw);margin:0 auto;
  background:var(--bg);
  border-top-left-radius:22px;border-top-right-radius:22px;
  max-height:92vh;overflow-y:auto;
  transform:translateY(100%);transition:transform .22s cubic-bezier(.32,.72,0,1);
  pointer-events:none;
  box-shadow:0 -10px 40px -6px rgba(0,0,0,.25);
}
#modalRoot.open{pointer-events:auto;}
#modalRoot.open .overlay{opacity:1;pointer-events:auto;}
#modalRoot.open .sheet{transform:translateY(0);pointer-events:auto;}
.sheet-handle{
  display:flex;justify-content:center;padding:10px 0 2px;
}
.sheet-handle span{width:36px;height:4px;border-radius:99px;background:var(--line-strong);opacity:.25;}
.sheet-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 18px 12px;
}
.sheet-head h3{margin:0;font-size:16.5px;font-weight:800;}
.sheet-close{
  width:32px;height:32px;border-radius:50%;border:none;background:var(--primary-soft);
  color:var(--primary);font-size:16px;display:flex;align-items:center;justify-content:center;
}
.sheet-body{padding:2px 18px 26px;}

/* ---------- toast ---------- */
#toast{
  position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:11px 18px;border-radius:12px;
  font-size:13.5px;font-weight:600;z-index:200;opacity:0;transition:all .25s ease;
  pointer-events:none;max-width:86%;text-align:center;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ---------- invoice ---------- */
.invoice{
  background:var(--paper);border-radius:var(--radius);border:1px solid var(--line);
  padding:18px;box-shadow:var(--shadow);
}
.invoice-head{text-align:center;margin-bottom:12px;}
.invoice-head .house{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);font-weight:700;}
.invoice-head .doc-title{font-size:17px;font-weight:800;color:var(--primary);margin-top:4px;}
.invoice-head .period{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
.invoice-meta{
  display:flex;justify-content:space-between;font-size:12.5px;color:var(--ink-soft);
  border-top:1px dashed var(--line);border-bottom:1px dashed var(--line);
  padding:8px 0;margin:10px 0;
}
.invoice-meta b{color:var(--ink);}
.invoice .grand{
  display:flex;justify-content:space-between;align-items:baseline;
  border-top:2px solid var(--line-strong);margin-top:8px;padding-top:10px;
}
.invoice .grand .lbl{font-weight:800;font-size:14.5px;}
.invoice .grand .val{font-weight:800;font-size:21px;color:var(--primary);}
.invoice .paid-box{
  margin-top:14px;padding:12px;border-radius:12px;background:var(--primary-soft);
}
.invoice .note-box{
  margin-top:10px;padding:10px 12px;border-radius:10px;background:var(--accent-soft);
  color:#6b4c15;font-size:12.5px;line-height:1.5;
}
.invoice .footer-info{
  margin-top:14px;font-size:11.5px;color:var(--ink-soft);line-height:1.7;
  border-top:1px dashed var(--line);padding-top:10px;
}
.badge-status{
  display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:800;
  padding:4px 10px;border-radius:999px;
}

/* ---------- misc ---------- */
.muted{color:var(--ink-soft);}
.center{text-align:center;}
.mt0{margin-top:0;}
.grid-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
.grid-actions3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:14px;}
a{color:inherit;}
.list-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 0;border-bottom:1px solid var(--line);
}
.list-item:last-child{border-bottom:none;}
.list-item .l-title{font-weight:700;font-size:14px;}
.list-item .l-sub{font-size:12px;color:var(--ink-soft);margin-top:1px;}
.warn-banner{
  background:var(--danger-soft);color:var(--danger);font-size:12.5px;font-weight:600;
  padding:10px 12px;border-radius:10px;margin-bottom:10px;line-height:1.5;
}
.searchbox{position:relative;}
.searchbox svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-soft);width:15px;height:15px;}
.searchbox input{padding-left:34px;}
.tel-link{color:var(--primary);font-weight:700;text-decoration:none;}

.switch-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 0;gap:10px;
}
.switch-row .switch-label{font-size:13.5px;font-weight:600;}
.switch{
  position:relative;width:42px;height:24px;flex:0 0 auto;
  border-radius:999px;background:var(--line);border:none;
}
.switch.on{background:var(--primary);}
.switch .knob{
  position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;
  background:#fff;transition:transform .15s ease;box-shadow:0 1px 3px rgba(0,0,0,.3);
}
.switch.on .knob{transform:translateX(18px);}

.batch-row{
  display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--line);
}
.batch-row:last-child{border-bottom:none;}
.batch-row .b-name{flex:0 0 78px;font-size:12.5px;font-weight:700;line-height:1.25;}
.batch-row .b-name .sub{display:block;font-weight:500;color:var(--ink-soft);font-size:10.5px;}
.batch-row .b-fields{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.batch-row input{padding:8px 8px;font-size:13px;}
.batch-row .b-old{font-size:10px;color:var(--ink-soft);margin-bottom:2px;}

.qr-wrap{
  text-align:center;margin-top:10px;
}
.qr-wrap img{width:150px;height:150px;border-radius:10px;border:1px solid var(--line);background:#fff;}
.qr-wrap .qr-hint{font-size:11px;color:var(--ink-soft);margin-top:6px;}

.swipe-hint{
  text-align:center;font-size:11px;color:var(--ink-soft);margin-top:8px;
}

@media print{

<script>
"use strict";
/* =========================================================
   SO THU TRO - quan ly phong tro, dien nuoc, hoa don
   Du lieu luu 100% cuc bo tren may (localStorage).
   ========================================================= */

var APP_VERSION = "2026.07.15-3";
var STORAGE_KEY = "sotrotro_data_v1";

function defaultData(){
  return {
    version: 1,
    settings: {
      ownerName: "",
      phone: "",
      bankName: "",
      bankBin: "",
      bankAccountName: "",
      bankAccountNumber: "",
      wifiName: "",
      wifiPassword: "",
      defaultRoomPrice: 800000,
      elecPrice: 3500,
      waterPrice: 6000,
      waterMinUnits: 3,
      waterMinPricePerPerson: 10000,
      extraPersonFee: 100000,
      trashFee: 15000,
      wifiFee: 0,
      cutoffDay: 10,
      currency: "đ",
      note: "Vui lòng thanh toán đúng hẹn. Cảm ơn quý khách!",
      adminNote: "",
      driveClientId: "",
      driveLastSync: null
    },
    rooms: [],
    entries: []
  };
}

function loadData(){
  try{
    var raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultData();
    var parsed = JSON.parse(raw);
    var d = defaultData();
    d.settings = Object.assign(d.settings, parsed.settings||{});
    d.rooms = Array.isArray(parsed.rooms)? parsed.rooms : [];
    d.entries = Array.isArray(parsed.entries)? parsed.entries : [];
    return d;
  }catch(err){
    console.error("Loi doc du lieu, dung du lieu trong.", err);
    return defaultData();
  }
}

function saveData(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
  scheduleAutoSaveWrite();
}

var DATA = loadData();

var UI = {
  tab: "dashboard",
  month: todayMonthKey(),
  roomId: null,
  roomSearch: "",
  roomSortMode: "drag",
  statRange: 6,
  modal: null
};

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function pad2(n){ return (n<10?"0":"")+n; }
function todayMonthKey(){
  var t = new Date();
  return t.getFullYear()+"-"+pad2(t.getMonth()+1);
}
function monthKeyParts(mk){
  var p = mk.split("-"); return {y:+p[0], m:+p[1]};
}
function addMonths(mk, delta){
  var p = monthKeyParts(mk);
  var idx = p.y*12 + (p.m-1) + delta;
  var y = Math.floor(idx/12);
  var m = idx%12 + 1;
  return y+"-"+pad2(m);
}
function monthLabel(mk){
  var p = monthKeyParts(mk);
  return "Tháng "+p.m+" · "+p.y;
}
function daysInMonth(y,m){ return new Date(y, m, 0).getDate(); }
function formatDateDMY(y,m,d){ return pad2(d)+"/"+pad2(m)+"/"+y; }
function maxAllowedMonth(){ return addMonths(todayMonthKey(), 1); }

function periodForMonth(mk){
  var p = monthKeyParts(mk);
  var cutoff = DATA.settings.cutoffDay||10;
  var fromDay = Math.min(cutoff, daysInMonth(p.y,p.m));
  var nextIdx = p.y*12+(p.m-1)+1;
  var ny = Math.floor(nextIdx/12), nm = nextIdx%12+1;
  var toDay = Math.min(cutoff, daysInMonth(ny,nm));
  return {
    from: formatDateDMY(p.y,p.m,fromDay),
    to: formatDateDMY(ny,nm,toDay)
  };
}

function fmtMoney(n){
  n = Math.round(Number(n)||0);
  var neg = n<0; n = Math.abs(n);
  var s = n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  return (neg?"-":"") + s + DATA.settings.currency;
}
function fmtNum(n){
  n = Math.round(Number(n)||0);
  return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}
function parseNum(v){
  if(v===null||v===undefined) return 0;
  v = String(v).replace(/[^\d\-]/g,"");
  var n = parseInt(v,10);
  return isNaN(n)?0:n;
}
function esc(s){
  return String(s==null?"":s).replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
  });
}

function toast(msg){
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toast._h);
  toast._h = setTimeout(function(){ t.classList.remove("show"); }, 2200);
}

function getRoom(id){ return DATA.rooms.find(function(r){return r.id===id;}); }
function activeRooms(){ return DATA.rooms.filter(function(r){return r.active!==false;}); }

function roomEntries(roomId){
  return DATA.entries.filter(function(e){return e.roomId===roomId;})
    .sort(function(a,b){return a.month<b.month?-1:a.month>b.month?1:0;});
}
function getEntry(roomId, month){
  return DATA.entries.find(function(e){return e.roomId===roomId && e.month===month;});
}
function prevReadingFor(roomId, month){
  var list = roomEntries(roomId).filter(function(e){return e.month<month;});
  if(list.length){
    var last = list[list.length-1];
    return {elec:last.elecNew, water:last.waterNew};
  }
  var room = getRoom(roomId);
  return {elec:(room&&room.initialElecReading)||0, water:(room&&room.initialWaterReading)||0};
}

function effectiveRoomPrice(room){ return (room.roomPriceOverride!=null && room.roomPriceOverride!=="")? room.roomPriceOverride : DATA.settings.defaultRoomPrice; }
function effectiveElecPrice(room){ return (room.elecPriceOverride!=null && room.elecPriceOverride!=="")? room.elecPriceOverride : DATA.settings.elecPrice; }
function effectiveWaterPrice(room){ return (room.waterPriceOverride!=null && room.waterPriceOverride!=="")? room.waterPriceOverride : DATA.settings.waterPrice; }
function effectiveTrashFee(room){ return (room.trashFeeOverride!=null && room.trashFeeOverride!=="")? room.trashFeeOverride : DATA.settings.trashFee; }
function effectiveWifiFee(room){ if(room.noWifi) return 0; return (room.wifiFeeOverride!=null && room.wifiFeeOverride!=="")? room.wifiFeeOverride : DATA.settings.wifiFee; }

function computeBreakdown(e){
  var occ = Number(e.occupants)||0;
  var rent = Number(e.roomPrice||0) + Math.max(0, occ-2)*Number(e.extraPersonFee||0);
  var elecUsage = Number(e.elecNew||0) - Number(e.elecOld||0);
  var elecCost = elecUsage * Number(e.elecPrice||0);
  var minUnits = Number(e.waterMinUnits||0) * occ;
  var waterUsage = Number(e.waterNew||0) - Number(e.waterOld||0);
  var waterCost = waterUsage <= minUnits ? occ*Number(e.waterMinPricePerPerson||0) : waterUsage*Number(e.waterPrice||0);
  var trash = Number(e.trashFee||0);
  var wifi = Number(e.wifiFee||0);
  var total = rent+elecCost+waterCost+trash+wifi;
  return {occ:occ, rent:rent, elecUsage:elecUsage, elecCost:elecCost, waterUsage:waterUsage, waterCost:waterCost, trash:trash, wifi:wifi, total:total};
}

function monthSummary(month){
  var rooms = activeRooms();
  var totalRent=0, totalElec=0, totalWater=0, totalOther=0, totalAll=0, received=0, doneCount=0, paidCount=0;
  rooms.forEach(function(r){
    var e = getEntry(r.id, month);
    if(e){
      var b = computeBreakdown(e);
      totalRent+=b.rent; totalElec+=b.elecCost; totalWater+=b.waterCost; totalOther+=(b.trash+b.wifi);
      totalAll+=b.total; doneCount++;
      if(e.received!=null){ received += Number(e.received); paidCount++; }
    }
  });
  return {rooms:rooms.length, doneCount:doneCount, paidCount:paidCount, totalRent:totalRent, totalElec:totalElec, totalWater:totalWater, totalOther:totalOther, totalAll:totalAll, received:received, remaining:totalAll-received};
}

function showVacantRoomsModal(){
  UI.modal = {type:"vacantRooms"};
  var rooms = DATA.rooms.filter(function(r){ return r.active===false; });
  var html = "";
  if(rooms.length===0){
    html += '<div class="hint">Hiện không có phòng nào đang trống — tất cả đều đã có người thuê. 🎉</div>';
  } else {
    html += '<div class="hint" style="margin-bottom:12px;">'+rooms.length+' phòng đang trống (đã trả phòng, chưa có người thuê mới). Bấm vào phòng để cập nhật người thuê mới hoặc cho thuê lại.</div>';
    html += '<div class="room-list">';
    rooms.forEach(function(r){
      html += '<div class="room-card" data-action="goRoomDetailFromModal" data-room="'+r.id+'">'+
        '<div class="avatar">'+esc(roomInitial(r.name))+'</div>'+
        '<div class="body"><div class="name">'+esc(r.name)+'</div>'+
        '<div class="meta">Trả phòng gần nhất'+(r.tenantName? " · "+esc(r.tenantName)+" (cũ)":"")+'</div></div>'+
        '<div class="chevron">'+ICONS.chevron+'</div></div>';
    });
    html += '</div>';
  }
  openModal("Phòng còn trống", html);
}

/* ---------------- icons ---------------- */
var ICONS = {
  home:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/></svg>',

  gear:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 13.5a7.9 7.9 0 0 0 0-3l1.9-1.5-2-3.4-2.3.7a7.7 7.7 0 0 0-2.6-1.5L14 2h-4l-.4 2.3a7.7 7.7 0 0 0-2.6 1.5l-2.3-.7-2 3.4L4.6 10a7.9 7.9 0 0 0 0 3l-1.9 1.5 2 3.4 2.3-.7c.77.66 1.65 1.18 2.6 1.5L10 22h4l.4-2.3a7.7 7.7 0 0 0 2.6-1.5l2.3.7 2-3.4-1.9-1.5Z"/></svg>',
  chevron:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg>',

  bolt:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z"/></svg>',

  cloud:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 18a4.5 4.5 0 0 1-.5-9 5.5 5.5 0 0 1 10.7-1.7A4 4 0 0 1 17 18H7Z"/></svg>',
  camera:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8a1 1 0 0 1 1-1h2l1.2-1.8A1 1 0 0 1 9 5h6a1 1 0 0 1 .8.4L17 7h2a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V8Z"/><circle cx="12" cy="13" r="3.3"/></svg>',
  grip:'<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.6"/><circle cx="15" cy="6" r="1.6"/><circle cx="9" cy="12" r="1.6"/><circle cx="15" cy="12" r="1.6"/><circle cx="9" cy="18" r="1.6"/><circle cx="15" cy="18" r="1.6"/></svg>',
  chart:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>'
};

/* ---------------- shared compact top bar ---------------- */
function topBar(opts){
  opts = opts||{};
  var iconHtml = opts.back
    ? '<button class="tb-icon" data-action="'+(opts.backAction||"setTab")+'"'+(opts.backTab?' data-tab="'+opts.backTab+'"':"")+' style="border:none;cursor:pointer;">'+ICONS.back+'</button>'
    : '<div class="tb-icon">'+(opts.icon||ICONS.home)+'</div>';
  var actionHtml = opts.action
    ? '<button class="tb-action" data-action="'+opts.action+'"'+(opts.actionData||"")+'>'+opts.actionIcon+'</button>'
    : "";
  var html = '<div class="topbar"><div class="tb-row">'+iconHtml+
    '<div class="tb-text"><h1>'+opts.title+'</h1>'+(opts.sub?'<div class="sub">'+opts.sub+'</div>':"")+'</div>'+actionHtml+'</div>';
  if(opts.month){
    var nextDisabled = opts.nextDisabled? " disabled":"";
    html += '<div class="month-switch"><button data-action="prevMonth">‹</button><div class="label">'+monthLabel(opts.month)+'</div><button data-action="nextMonth"'+nextDisabled+'>›</button></div>';
  }
  html += '</div>';
  return html;
}

/* ---------------- dashboard ---------------- */
function roomInitial(name){
  var s = (name||"?").trim();
  var m = s.match(/\d+/);
  return m? m[0] : s.slice(0,2).toUpperCase();
}

function renderDashboard(){
  var month = UI.month;
  var sum = monthSummary(month);
  var rooms = activeRooms();

  var html = "";
  html += topBar({
    icon: ICONS.home,
    title: "Tổng quan",
    sub: DATA.settings.ownerName? esc(DATA.settings.ownerName): "Quản lý tiền phòng, điện, nước",
    action: "openBatchEntry",
    actionIcon: ICONS.grid,
    month: month,
    nextDisabled: month>=maxAllowedMonth()
  });

  html += '<div class="content">';

  if(rooms.length===0){
    html += '<div class="room-card empty-state"><div class="icon">🏠</div>'+
      '<div style="font-weight:700;font-size:15px;">Chưa có phòng nào</div>'+
      '<p>Thêm phòng đầu tiên để bắt đầu ghi nhận điện, nước và tiền thuê hàng tháng.</p>'+

/* ---------------- stats tab ---------------- */
function statMonthsRange(n){
  var arr = [];
  for(var i=n-1;i>=0;i--) arr.push(addMonths(UI.month, -i));
  return arr;
}
function statDeltaBadge(arr){
  var last=null, prev=null;
  for(var i=arr.length-1;i>=0;i--){
    if(arr[i]!=null){ if(last===null){ last=arr[i]; } else { prev=arr[i]; break; } }
  }
  if(last===null || prev===null) return {cls:"", text:"—"};
  var diff = last-prev;
  if(diff===0) return {cls:"", text:"0%"};
  var pct = prev===0? 100 : Math.round(Math.abs(diff)/prev*100);
  return diff>0? {cls:"up", text:"▲ "+pct+"%"} : {cls:"down", text:"▼ "+pct+"%"};
}
function statBarsHTML(arr){
  var vals = arr.map(function(v){ return v==null? 0 : v; });
  var max = Math.max.apply(Math, vals.concat([1]));
  var lastIdx = -1;
  for(var i=arr.length-1;i>=0;i--){ if(arr[i]!=null){ lastIdx=i; break; } }
  var prevIdx = -1;
  for(var i=lastIdx-1;i>=0;i--){ if(arr[i]!=null){ prevIdx=i; break; } }
  var html = '<div class="stat-bars">';
  arr.forEach(function(v,i){
    var h = v==null? 2 : Math.max(4, Math.round((v/max)*54));
    var cls = "stat-bar";
    if(i===lastIdx){
      if(prevIdx>-1 && v>arr[prevIdx]) cls += " up";
      else if(prevIdx>-1 && v<arr[prevIdx]) cls += " down";
      else cls += " last";
    }
    html += '<div class="'+cls+'" style="height:'+h+'px" title="'+(v==null?"Chưa nhập số":fmtNum(v))+'"></div>';
  });
  html += '</div>';
  return html;
}
/* pay: array of {total, received} or null per month, for the "collected vs owed" trend */
function statPaymentBarsHTML(pay){
  var totals = pay.map(function(p){ return p? p.total : 0; });
  var max = Math.max.apply(Math, totals.concat([1]));
  var html = '<div class="stat-pay-bars">';
  pay.forEach(function(p){
    if(!p){
      html += '<div class="stat-pay-bar" style="height:2px;" title="Chưa nhập số"></div>';
      return;
    }
    var h = Math.max(4, Math.round((p.total/max)*40));
    var received = p.received==null? 0 : Math.min(p.received, p.total);
    var paidRatio = p.total>0? (received/p.total) : 1;
    var paidH = Math.round(h*paidRatio);
    var owedH = h-paidH;
    var title = p.received==null? "Chưa thu ("+fmtMoney(p.total)+")" : "Đã thu "+fmtMoney(p.received)+" / "+fmtMoney(p.total);
    html += '<div class="stat-pay-bar" style="height:'+h+'px" title="'+title+'">'+
      (owedH>0? '<div class="seg-owed" style="height:'+owedH+'px"></div>':'')+
      (paidH>0? '<div class="seg-paid" style="height:'+paidH+'px"></div>':'')+
      '</div>';
  });
  html += '</div>';
  return html;
}
function statCardHTML(r, months, elecArr, waterArr, payArr){
  var elecDelta = statDeltaBadge(elecArr);
  var waterDelta = statDeltaBadge(waterArr);
  var monthsLbl = months.map(function(mk){ return "T"+monthKeyParts(mk).m; });
  var monthsHtml = '<div class="stat-months">'+monthsLbl.map(function(m){return '<span>'+m+'</span>';}).join("")+'</div>';
  var totalCollected=0, totalOwed=0;
  payArr.forEach(function(p){ if(p){ var rec=p.received==null?0:p.received; totalCollected+=rec; totalOwed+=Math.max(0,p.total-rec); } });
  var html = '<div class="card stat-card">';
  html += '<div class="stat-room">'+esc(r.name)+(r.tenantName? ' <span class="chip chip-pending" style="margin-top:0;">'+esc(r.tenantName)+'</span>':'')+'</div>';
  html += '<div class="stat-chart-label">'+ICONS.bolt+' Điện (kWh)<span class="stat-delta '+elecDelta.cls+'">'+elecDelta.text+'</span></div>';
  html += statBarsHTML(elecArr);
  html += monthsHtml;
  html += '<div class="stat-chart-label" style="margin-top:8px;">'+ICONS.drop+' Nước (m³)<span class="stat-delta '+waterDelta.cls+'">'+waterDelta.text+'</span></div>';
  html += statBarsHTML(waterArr);
  html += monthsHtml;
  html += '<div class="stat-chart-label" style="margin-top:8px;">Thanh toán (xanh=đã thu, đỏ=còn nợ)</div>';
  html += statPaymentBarsHTML(payArr);
  html += monthsHtml;
  html += '<div class="stat-pay-summary">'+months.length+' tháng: đã thu <b>'+fmtMoney(totalCollected)+'</b>'+(totalOwed>0? ' · còn nợ <b style="color:var(--danger);">'+fmtMoney(totalOwed)+'</b>':' · không nợ')+'</div>';
  html += '</div>';
  return html;
}

/* ---------------- Auto-save to a real file on the device (File System Access API, when supported) ---------------- */
var AUTOSAVE_HANDLE = null;
var AUTOSAVE_NAME = "";
var AUTOSAVE_NEEDS_PERMISSION = false;
var AUTOSAVE_SUPPORTED = (typeof window.showSaveFilePicker === "function");
var _autoSaveTimer = null;

function fsDbOpen(cb){
  if(!window.indexedDB){ cb(null); return; }
  try{
    var req = indexedDB.open("sotrotro_fs", 1);
    req.onupgradeneeded = function(){ req.result.createObjectStore("handles"); };
    req.onsuccess = function(){ cb(req.result); };
    req.onerror = function(){ cb(null); };
  }catch(e){ cb(null); }
}
function fsSaveHandle(handle, cb){
  fsDbOpen(function(db){
    if(!db){ cb(false); return; }
    try{
      var tx = db.transaction("handles","readwrite");
      tx.objectStore("handles").put(handle, "autosave");
      tx.oncomplete = function(){ cb(true); };
      tx.onerror = function(){ cb(false); };
    }catch(e){ cb(false); }
  });
}
function fsLoadHandle(cb){
  fsDbOpen(function(db){
    if(!db){ cb(null); return; }
    try{
      var tx = db.transaction("handles","readonly");
      var req = tx.objectStore("handles").get("autosave");
      req.onsuccess = function(){ cb(req.result||null); };
      req.onerror = function(){ cb(null); };
    }catch(e){ cb(null); }
  });
}
function fsClearHandle(cb){
  fsDbOpen(function(db){
    if(!db){ cb(false); return; }
    try{
      var tx = db.transaction("handles","readwrite");
      tx.objectStore("handles").delete("autosave");
      tx.oncomplete = function(){ cb(true); };
      tx.onerror = function(){ cb(false); };
    }catch(e){ cb(false); }
  });
}
function initAutoSaveFile(){
  if(!AUTOSAVE_SUPPORTED) return;
  fsLoadHandle(function(handle){
    if(!handle) return;
    AUTOSAVE_HANDLE = handle;
    AUTOSAVE_NAME = handle.name || "";
    handle.queryPermission({mode:"readwrite"}).then(function(p){
      AUTOSAVE_NEEDS_PERMISSION = (p!=="granted");
      if(UI.tab==="settings") render();
    }).catch(function(){ AUTOSAVE_NEEDS_PERMISSION = true; });
  });
}
function connectAutoSaveFile(){
  if(!AUTOSAVE_SUPPORTED){ toast("Trình duyệt này chưa hỗ trợ tính năng lưu ra file riêng"); return; }
  window.showSaveFilePicker({
    suggestedName: "so-thu-tro-du-lieu.json",
    types: [{description:"Dữ liệu Sổ Thu Trọ", accept:{"application/json":[".json"]}}]
  }).then(function(handle){
    AUTOSAVE_HANDLE = handle;
    AUTOSAVE_NAME = handle.name;
    AUTOSAVE_NEEDS_PERMISSION = false;
    fsSaveHandle(handle, function(){});
    writeAutoSaveFile();
    toast("Đã kết nối, sẽ tự lưu vào: "+handle.name);
    render();
  }).catch(function(err){
    if(err && err.name==="AbortError") return;
    toast("Không chọn được file");
  });
}
function disconnectAutoSaveFile(){
  AUTOSAVE_HANDLE = null; AUTOSAVE_NAME = ""; AUTOSAVE_NEEDS_PERMISSION = false;
  fsClearHandle(function(){});
  toast("Đã ngắt kết nối file trên máy");
  render();
}
function reauthorizeAutoSaveFile(){
  if(!AUTOSAVE_HANDLE) return;
  AUTOSAVE_HANDLE.requestPermission({mode:"readwrite"}).then(function(p){
    AUTOSAVE_NEEDS_PERMISSION = (p!=="granted");
    if(!AUTOSAVE_NEEDS_PERMISSION){ writeAutoSaveFile(); toast("Đã cấp lại quyền, tiếp tục lưu tự động"); }

function writeAutoSaveFile(){

  }).then(function(){
    if(AUTOSAVE_NEEDS_PERMISSION){ AUTOSAVE_NEEDS_PERMISSION = false; if(UI.tab==="settings") render(); }
  }).catch(function(){

  html += '</div>';

function loadGisScript(cb){
  if(window.google && window.google.accounts && window.google.accounts.oauth2){ cb(); return; }
  var el = document.createElement("script");
  el.src = "https://accounts.google.com/gsi/client";
  el.onload = cb;
  el.onerror = function(){ toast("Không tải được thư viện Google (cần có mạng)."); };
  document.head.appendChild(el);
}
function driveSignIn(){
  var clientId = DATA.settings.driveClientId;
  if(!clientId){ toast("Nhập Google Client ID trước đã"); return; }
  loadGisScript(function(){
    try{
      var client = google.accounts.oauth2.initTokenClient({
        client_id: clientId,
        scope: "https://www.googleapis.com/auth/drive.appdata",
        callback: function(resp){
          if(resp && resp.access_token){
            DRIVE_TOKEN = resp.access_token;
            toast("Đã đăng nhập Google");
            render();
          } else {
            toast("Đăng nhập không thành công");
          }
        }
      });
      client.requestAccessToken();
    }catch(err){
      toast("Không đăng nhập được — kiểm tra Client ID và địa chỉ trang (phải là https).");
    }
  });
}
function driveFindFileId(cb){
  fetch("https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q="+encodeURIComponent("name='sotrotro-backup.json'")+"&fields=files(id)", {
    headers:{Authorization:"Bearer "+DRIVE_TOKEN}
  }).then(function(r){ return r.json(); }).then(function(data){
    cb(data.files && data.files[0] ? data.files[0].id : null);
  }).catch(function(){ cb(null); });
}
function driveUploadNow(){
  if(!DRIVE_TOKEN){ toast("Đăng nhập Google trước"); return; }
  driveFindFileId(function(fileId){
    var boundary = "sotrotro_boundary_"+Date.now();
    var metadata = fileId? {name:"sotrotro-backup.json"} : {name:"sotrotro-backup.json", parents:["appDataFolder"]};
    var body = "--"+boundary+"\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n"+JSON.stringify(metadata)+
      "\r\n--"+boundary+"\r\nContent-Type: application/json\r\n\r\n"+JSON.stringify(DATA)+"\r\n--"+boundary+"--";
    var url = fileId
      ? "https://www.googleapis.com/upload/drive/v3/files/"+fileId+"?uploadType=multipart"
      : "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";
    fetch(url, {
      method: fileId? "PATCH":"POST",
      headers:{Authorization:"Bearer "+DRIVE_TOKEN, "Content-Type":"multipart/related; boundary="+boundary},
      body: body
    }).then(function(r){ if(!r.ok) throw new Error("fail"); return r.json(); })
      .then(function(){
        DATA.settings.driveLastSync = Date.now();
        saveData(); toast("Đã tải dữ liệu lên Google Drive"); render();
      })
      .catch(function(){ toast("Tải lên thất bại, kiểm tra mạng."); });
  });
}
function driveDownloadNow(){
  if(!DRIVE_TOKEN){ toast("Đăng nhập Google trước"); return; }
  openTypedConfirm({
    title: "Tải dữ liệu từ Drive",
    message: "Tải dữ liệu từ Google Drive sẽ THAY THẾ toàn bộ dữ liệu hiện tại trên máy này. Hành động không thể hoàn tác.",
    confirmLabel: "Tải về & thay thế",
    onConfirm: function(){
      driveFindFileId(function(fileId){
        if(!fileId){ toast("Chưa có bản sao lưu nào trên Drive"); return; }
        fetch("https://www.googleapis.com/drive/v3/files/"+fileId+"?alt=media", {
          headers:{Authorization:"Bearer "+DRIVE_TOKEN}
        }).then(function(r){ return r.json(); }).then(function(parsed){
          var d = defaultData();
          d.settings = Object.assign(d.settings, parsed.settings||{});
          d.rooms = parsed.rooms||[];
          d.entries = parsed.entries||[];
          DATA = d;
          saveData();
          setTab("dashboard");
          toast("Đã tải dữ liệu từ Google Drive");
        }).catch(function(){ toast("Tải về thất bại, kiểm tra mạng."); });
      });
    }
  });
}

/* ---- QR image: pre-fetch as data URL so it's reliably present when printing / exporting as image ---- */
var QR_DATA_CACHE = {};
function loadQrDataUrl(url, cb){
  if(QR_DATA_CACHE[url]!==undefined){ cb(QR_DATA_CACHE[url]); return; }
  fetch(url, {mode:"cors"}).then(function(r){
    if(!r.ok) throw new Error("bad status");
    return r.blob();
  }).then(function(blob){
    var reader = new FileReader();
    reader.onload = function(){ QR_DATA_CACHE[url] = reader.result; cb(reader.result); };
    reader.onerror = function(){ QR_DATA_CACHE[url] = null; cb(null); };
    reader.readAsDataURL(blob);
  }).catch(function(){ QR_DATA_CACHE[url] = null; cb(null); });
}
function upgradeQrImage(){
  var img = document.getElementById("qrImg");
  if(!img) return;
  var url = img.getAttribute("data-qrurl");
  if(!url) return;
  loadQrDataUrl(url, function(dataUrl){
    var stillThere = document.getElementById("qrImg");
    if(stillThere && dataUrl) stillThere.src = dataUrl;
  });
}
/* wait for every <img> inside a container to finish loading (success or error) before calling cb */
function whenImagesReady(container, cb){
  if(!container){ cb(); return; }
  var imgs = container.querySelectorAll("img");
  var pending = 0, done = false;
  function finish(){ if(done) return; done = true; cb(); }
  imgs.forEach(function(img){
    if(!img.complete){
      pending++;
      img.addEventListener("load", tick);
      img.addEventListener("error", tick);
    }
  });
  function tick(){ pending--; if(pending<=0) finish(); }
  if(pending===0) finish();
  setTimeout(finish, 3000); // safety timeout so a stuck image never blocks printing/sharing forever
}

    var waterEl = document.getElementById("batch_water_"+r.id);

    e.roomPrice = existing? existing.roomPrice : effectiveRoomPrice(r);
    e.elecPrice = existing? existing.elecPrice : effectiveElecPrice(r);
    e.waterPrice = existing? existing.waterPrice : effectiveWaterPrice(r);
    e.trashFee = existing? existing.trashFee : effectiveTrashFee(r);
    e.wifiFee = existing? existing.wifiFee : effectiveWifiFee(r);
    e.extraPersonFee = existing? existing.extraPersonFee : DATA.settings.extraPersonFee;
    e.waterMinUnits = existing? existing.waterMinUnits : DATA.settings.waterMinUnits;

    e.updatedAt = Date.now();

/* ---- drag to reorder rooms ---- */
var roomDrag = null;
var roomDragMoved = false;
var suppressNextClick = false;
var roomDragLastY = 0;
var roomDragScrollRAF = null;

document.addEventListener("pointerdown", function(ev){
  var handle = ev.target.closest(".drag-handle");
  if(!handle) return;
  var card = handle.closest(".room-card");
  var list = card && card.closest(".room-list");
  if(!card || !list) return;
  ev.preventDefault();
  roomDragMoved = false;
  roomDrag = { card: card, list: list, startY: ev.clientY };
  roomDragLastY = ev.clientY;
  card.classList.add("dragging");
  card.style.transform = "translateY(0px)";
  try{ handle.setPointerCapture(ev.pointerId); }catch(e){}
  if(!roomDragScrollRAF) roomDragScrollRAF = requestAnimationFrame(roomDragAutoScrollTick);
});

function updateRoomDragPosition(clientY){
  if(!roomDrag) return;
  var dy = clientY - roomDrag.startY;
  if(Math.abs(dy)>4) roomDragMoved = true;
  roomDrag.card.style.transform = "translateY("+dy+"px)";
  var siblings = Array.prototype.slice.call(roomDrag.list.children).filter(function(c){ return c!==roomDrag.card; });
  var cardRect = roomDrag.card.getBoundingClientRect();
  var cardMid = cardRect.top + cardRect.height/2;
  for(var i=0;i<siblings.length;i++){
    var s = siblings[i];
    var r = s.getBoundingClientRect();
    var mid = r.top + r.height/2;
    if(dy<0 && cardMid<mid){
      roomDrag.list.insertBefore(roomDrag.card, s);
      roomDrag.startY = clientY;
      roomDrag.card.style.transform = "translateY(0px)";
      break;
    } else if(dy>0 && cardMid>mid){
      roomDrag.list.insertBefore(roomDrag.card, s.nextElementSibling);
      roomDrag.startY = clientY;
      roomDrag.card.style.transform = "translateY(0px)";
      break;
    }
  }
}

function roomDragAutoScrollTick(){
  if(!roomDrag){ roomDragScrollRAF = null; return; }
  var vh = window.innerHeight;
  var edge = 90;
  var speed = 0;
  if(roomDragLastY < edge) speed = -Math.ceil((edge-roomDragLastY)/3);
  else if(roomDragLastY > vh-edge) speed = Math.ceil((edge-(vh-roomDragLastY))/3);
  if(speed!==0){
    window.scrollBy(0, speed);
    updateRoomDragPosition(roomDragLastY);
  }
  roomDragScrollRAF = requestAnimationFrame(roomDragAutoScrollTick);
}

document.addEventListener("pointermove", function(ev){
  if(!roomDrag) return;
  ev.preventDefault();
  roomDragLastY = ev.clientY;
  updateRoomDragPosition(ev.clientY);
}, {passive:false});

function finishRoomDrag(){
  if(!roomDrag) return;
  var card = roomDrag.card, list = roomDrag.list;
  card.classList.remove("dragging");
  card.style.transform = "";
  if(roomDragScrollRAF){ cancelAnimationFrame(roomDragScrollRAF); roomDragScrollRAF = null; }
  if(roomDragMoved){
    var ids = Array.prototype.slice.call(list.children).map(function(c){ return c.getAttribute("data-room"); });
    var isActive = list.getAttribute("data-section")==="active";
    var queue = ids.slice();
    DATA.rooms = DATA.rooms.map(function(r){
      if((r.active!==false)===isActive){
        var id = queue.shift();
        return getRoom(id) || r;
      }
      return r;
    });
    saveData();
    suppressNextClick = true;
    setTimeout(function(){ suppressNextClick = false; }, 60);
    render();
  }
  roomDrag = null;
}
document.addEventListener("pointerup", finishRoomDrag);
document.addEventListener("pointercancel", finishRoomDrag);

/* ---- reorder rooms by typing a position number (mobile-friendly alternative to drag) ---- */
function reorderRoomByNumber(el){
  var roomId = el.getAttribute("data-room");
  var section = el.getAttribute("data-section");
  var isActive = section==="active";
  var indices = [];
  DATA.rooms.forEach(function(r,i){ if((r.active!==false)===isActive) indices.push(i); });
  var subsequence = indices.map(function(i){ return DATA.rooms[i]; });
  var curIdx = -1;
  for(var i=0;i<subsequence.length;i++){ if(subsequence[i].id===roomId){ curIdx=i; break; } }
  if(curIdx===-1) return;
  var newPos = parseNum(el.value);
  if(!newPos || newPos<1) newPos = 1;
  if(newPos>subsequence.length) newPos = subsequence.length;
  var item = subsequence.splice(curIdx,1)[0];
  subsequence.splice(newPos-1,0,item);
  indices.forEach(function(slot,k){ DATA.rooms[slot] = subsequence[k]; });
  saveData();
  render();
  toast("Đã cập nhật thứ tự");
}

  var d = new Date();
  a.href = url;
  a.download = "sotrotro-backup-"+d.getFullYear()+pad2(d.getMonth()+1)+pad2(d.getDate())+".json";
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(function(){ URL.revokeObjectURL(url); }, 4000);
  toast("Đã xuất file sao lưu");
}
function handleImportFile(input){
  var file = input.files && input.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(){
    try{
      var parsed = JSON.parse(reader.result);
      if(!parsed || !Array.isArray(parsed.rooms) || !Array.isArray(parsed.entries)){
        toast("File không đúng định dạng sao lưu");
        input.value = "";
        return;
      }
      openTypedConfirm({
        title: "Nhập file sao lưu",
        message: "Nhập dữ liệu từ file này sẽ THAY THẾ toàn bộ dữ liệu hiện tại trên máy. Hành động không thể hoàn tác.",
        confirmLabel: "Nhập & thay thế dữ liệu",
        onConfirm: function(){
          var d = defaultData();
          d.settings = Object.assign(d.settings, parsed.settings||{});
          d.rooms = parsed.rooms;
          d.entries = parsed.entries;
          DATA = d;
          saveData();
          setTab("dashboard");
          toast("Đã khôi phục dữ liệu");
        }
      });
    }catch(err){
      toast("Không đọc được file này");
    }
    input.value = "";
  };
  reader.readAsText(file);
}
function resetAllData(){
  openTypedConfirm({
    title: "Xoá toàn bộ dữ liệu",
    message: "Xoá TOÀN BỘ dữ liệu (phòng, số điện nước, hoá đơn) trên máy này. Hành động không thể hoàn tác — hãy chắc chắn bạn đã xuất file sao lưu nếu chưa chắc chắn.",
    confirmLabel: "Xoá toàn bộ dữ liệu",
    onConfirm: function(){
      DATA = defaultData();
      saveData();
      setTab("dashboard");
      toast("Đã xoá toàn bộ dữ liệu");
    }
  });
}

/* ---- force-update: clear only the service-worker cache + registration, never touches saved data ---- */
function forceUpdateApp(){
  toast("Đang xoá bộ nhớ đệm và tải lại…");
  var tasks = [];
  if("serviceWorker" in navigator){
    tasks.push(
      navigator.serviceWorker.getRegistrations().then(function(regs){
        return Promise.all(regs.map(function(r){ return r.unregister(); }));
      }).catch(function(){})
    );
  }
  if(window.caches){
    tasks.push(
      caches.keys().then(function(keys){
        return Promise.all(keys.map(function(k){ return caches.delete(k); }));
      }).catch(function(){})
    );
  }
  Promise.all(tasks).then(function(){
    location.reload(true);
  }).catch(function(){
    location.reload(true);
  });
}

/* ---------------- modal ---------------- */
function openModal(title, bodyHtml){
  document.getElementById("sheetTitle").textContent = title;
  document.getElementById("sheetBody").innerHTML = bodyHtml;
  document.getElementById("modalRoot").classList.add("open");
  document.getElementById("sheet").scrollTop = 0;
}
function closeModal(){
  document.getElementById("modalRoot").classList.remove("open");
  UI.modal = null;
}

/* ---------------- navigation / render root ---------------- */
function setTab(tab){
  UI.tab = tab; UI.roomId = null;
  render();
  window.scrollTo(0,0);
}
function openRoomDetail(roomId){
  UI.tab = "roomDetail"; UI.roomId = roomId;
  render();
  window.scrollTo(0,0);
}

function render(){
  document.getElementById("tabbar").innerHTML = renderTabbarHTML();
  var app = document.getElementById("app");
  if(UI.tab==="dashboard") app.innerHTML = renderDashboard();
  else if(UI.tab==="rooms") app.innerHTML = renderRooms();
  else if(UI.tab==="roomDetail") app.innerHTML = renderRoomDetail(UI.roomId);
  else if(UI.tab==="stats") app.innerHTML = renderStats();
  else if(UI.tab==="settings") app.innerHTML = renderSettings();
}

function renderTabbarHTML(){
  var tabs = [
    {id:"dashboard", label:"Tổng quan", icon:ICONS.home},
    {id:"rooms", label:"Phòng", icon:ICONS.bed},
    {id:"stats", label:"Thống kê", icon:ICONS.chart},
    {id:"settings", label:"Cài đặt", icon:ICONS.gear}
  ];
  var activeTab = (UI.tab==="roomDetail")? "rooms" : UI.tab;
  return tabs.map(function(t){
    return '<button data-action="setTab" data-tab="'+t.id+'" class="'+(activeTab===t.id?"active":"")+'">'+t.icon+'<span>'+t.label+'</span></button>';
  }).join("");
}
